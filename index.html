<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Soda Machine</title>
</head>
<body>
    <div id="container">
        <div id="sodaListContainer">
            <ul id="sodaList">
                <li>aaaaaaaaaaaaaaa</li>
                <li>bbbbbbbbbbbbbbb</li>
                <li>ccccccccccccccc</li>
            </ul>
        </div>
        <div id="coinsContainer">
            <div class="coinContainer"><img class="coin" src="./images/25cents.png" alt="25 centavos"></div>
            <div class="coinContainer"><img class="coin" src="./images/50cents.png" alt="50 centavos"></div>
            <div class="coinContainer"><img class="coin" src="./images/1real.png" alt="1 real"></div>
        </div>
        <div id="sodaMachineContainer"><img id="vending" src="./images/vending.png" alt="Vending Machine"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
